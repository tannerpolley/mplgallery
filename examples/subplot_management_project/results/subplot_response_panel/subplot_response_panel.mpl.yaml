version: 1
plot_id: subplot_response_panel
title: Response panel
files:
  figures:
  - subplot_response_panel.svg
  data:
  - subplot_response_panel.csv
matplotlib:
  kind: line
  x: time_s
  y: []
  title: Response panel
  xlabel: Time
  xlabel_unit: $\mathrm{s}$
  ylabel: Response
  ylabel_unit: $\mathrm{a.u.}$
  xscale: linear
  yscale: linear
  grid: true
  figure:
    width_inches: 6.0
    height_inches: 3.4
    dpi: 150
  series:
  - y: response
    label: Raw response
    color: '#1f77b4'
    linewidth: 1.2
    linestyle: '-'
    marker: ''
    alpha: 0.5
  - y: response_smooth
    label: Smoothed response
    color: '#d62728'
    linewidth: 1.8
    linestyle: '-'
    marker: ''
    alpha: 1.0
  subplots: []
  sharex: false
  sharey: false
