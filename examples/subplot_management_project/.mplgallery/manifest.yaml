version: 1
records:
- plot_path: plots/subplot_signal_review.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  redraw:
    kind: line
    y: []
    title: Subplot signal review
    xscale: linear
    yscale: linear
    grid: true
    grid_axis: both
    grid_alpha: 0.25
    legend_location: best
    figure:
      width_inches: 7.0
      height_inches: 5.2
      dpi: 150
      constrained_layout: true
    series:
    - y: response
    - y: residual
    - y: response_smooth
    - y: residual_abs
    subplots:
    - subplot_id: response
      title: Response panel
      kind: line
      x: time_s
      y: []
      xlabel: Time
      xlabel_unit: $\mathrm{s}$
      ylabel: Response
      ylabel_unit: $\mathrm{a.u.}$
      xscale: linear
      yscale: linear
      grid: true
      grid_axis: both
      grid_alpha: 0.25
      legend_location: best
      series:
      - y: response
        label: Raw response
        color: '#1f77b4'
        linewidth: 1.2
        linestyle: '-'
        marker: ''
        alpha: 0.55
      - y: response_smooth
        label: Smoothed response
        color: '#d62728'
        linewidth: 1.8
        linestyle: '-'
        marker: ''
        alpha: 1.0
    - subplot_id: residual
      title: Residual panel
      kind: bar
      x: time_s
      y: []
      xlabel: Time
      xlabel_unit: $\mathrm{s}$
      ylabel: Residual
      ylabel_unit: $\mathrm{a.u.}$
      xscale: linear
      yscale: linear
      grid: true
      grid_axis: y
      grid_alpha: 0.25
      legend_location: best
      series:
      - y: residual_abs
        label: Absolute residual
        color: '#2ca02c'
        edgecolor: '#17202f'
        linewidth: 0.4
        hatch: ''
        bar_width: 0.055
        alpha: 0.75
    subplot_rows: 2
    subplot_cols: 1
    sharex: true
    sharey: false
  notes: Shared Matplotlib Figure with two editable Axes panels.
- plot_path: plots/subplot_response_panel.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  redraw:
    kind: line
    x: time_s
    y: []
    title: Response panel
    xlabel: Time
    xlabel_unit: $\mathrm{s}$
    ylabel: Response
    ylabel_unit: $\mathrm{a.u.}$
    xscale: linear
    yscale: linear
    grid: true
    figure:
      width_inches: 6.0
      height_inches: 3.4
      dpi: 150
    series:
    - y: response
      label: Raw response
      color: '#1f77b4'
      linewidth: 1.2
      linestyle: '-'
      marker: ''
      alpha: 0.5
    - y: response_smooth
      label: Smoothed response
      color: '#d62728'
      linewidth: 1.8
      linestyle: '-'
      marker: ''
      alpha: 1.0
    subplots: []
    sharex: false
    sharey: false
  notes: Standalone first subplot panel for testing subplot browsing beside the combined
    figure.
- plot_path: plots/subplot_residual_panel.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  redraw:
    kind: bar
    x: time_s
    y: []
    title: Residual panel
    xlabel: Time
    xlabel_unit: $\mathrm{s}$
    ylabel: Residual
    ylabel_unit: $\mathrm{a.u.}$
    xscale: linear
    yscale: linear
    grid: true
    figure:
      width_inches: 6.0
      height_inches: 3.0
      dpi: 150
    series:
    - y: residual_abs
      label: Absolute residual
      color: '#2ca02c'
      edgecolor: '#17202f'
      linewidth: 0.4
      hatch: ''
      bar_width: 0.055
      alpha: 0.75
    subplots: []
    sharex: false
    sharey: false
  notes: Standalone second subplot panel for testing subplot browsing beside the combined
    figure.
