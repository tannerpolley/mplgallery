version: 1
records:
- plot_path: plots/subplot_signal_review.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  notes: Static subplot example. Current live metadata editor renders single-axis cached previews; this artifact is included to guide subplot-management UI work.
  redraw:
    kind: line
    x: time_s
    title: Subplot signal review
    xlabel: Time
    xlabel_unit: $\mathrm{s}$
    ylabel: Response
    ylabel_unit: $\mathrm{a.u.}$
    xscale: linear
    yscale: linear
    grid: true
    figure:
      width_inches: 7.0
      height_inches: 5.2
      dpi: 150
    series:
    - y: response
      label: Raw response
      color: '#1f77b4'
      linewidth: 1.2
      linestyle: '-'
      marker: ''
      alpha: 0.55
    - y: response_smooth
      label: Smoothed response
      color: '#d62728'
      linewidth: 1.8
      linestyle: '-'
      marker: ''
      alpha: 1.0
- plot_path: plots/subplot_response_panel.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  notes: Standalone first subplot panel for testing subplot browsing beside the combined figure.
  redraw:
    kind: line
    x: time_s
    title: Response panel
    xlabel: Time
    xlabel_unit: $\mathrm{s}$
    ylabel: Response
    ylabel_unit: $\mathrm{a.u.}$
    grid: true
    figure:
      width_inches: 6.0
      height_inches: 3.4
      dpi: 150
    series:
    - y: response
      label: Raw response
      color: '#1f77b4'
      linewidth: 1.2
      linestyle: '-'
      marker: ''
      alpha: 0.5
    - y: response_smooth
      label: Smoothed response
      color: '#d62728'
      linewidth: 1.8
      linestyle: '-'
      marker: ''
      alpha: 1.0
- plot_path: plots/subplot_residual_panel.svg
  raw_csv_path: data/raw/subplot_signals_raw.csv
  plot_csv_path: data/plot_ready/subplot_signals_plot.csv
  notes: Standalone second subplot panel for testing subplot browsing beside the combined figure.
  redraw:
    kind: bar
    x: time_s
    title: Residual panel
    xlabel: Time
    xlabel_unit: $\mathrm{s}$
    ylabel: Residual
    ylabel_unit: $\mathrm{a.u.}$
    grid: true
    figure:
      width_inches: 6.0
      height_inches: 3.0
      dpi: 150
    series:
    - y: residual_abs
      label: Absolute residual
      color: '#2ca02c'
      edgecolor: '#17202f'
      linewidth: 0.4
      hatch: ''
      bar_width: 0.055
      alpha: 0.75
