version: 1
records:
  - plot_path: plots/category_counts.png
    raw_csv_path: data/raw/category_counts_raw.csv
    plot_csv_path: data/plot_ready/category_counts_plot.csv
    redraw:
      kind: bar
      x: category
      title: Category counts
      xlabel: Category
      ylabel: Count
      ylabel_unit: $\mathrm{a.u.}$
      grid: true
      figure:
        width_inches: 6.0
        height_inches: 4.0
        dpi: 150
      series:
        - y: count
          label: Count
          color: "#9467bd"
          alpha: 0.85
  - plot_path: plots/residual_distribution.svg
    raw_csv_path: data/raw/residuals_raw.csv
    plot_csv_path: data/plot_ready/residuals_plot.csv
    redraw:
      kind: hist
      x: sample_index
      title: Residual distribution
      xlabel: Residual
      xlabel_unit: $\mathrm{mV}$
      ylabel: Frequency
      grid: true
      bins: 18
      figure:
        width_inches: 6.0
        height_inches: 4.0
        dpi: 150
      series:
        - y: residual
          label: Residuals
          color: "#ff7f0e"
          alpha: 0.8
