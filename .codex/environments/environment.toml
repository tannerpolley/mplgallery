version = 1
name = "MPLGallery"

[setup]
script = '''
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

$repoRoot = (git rev-parse --show-toplevel).Trim()
Set-Location $repoRoot

if (-not (Get-Command uv -ErrorAction SilentlyContinue)) {
    throw "uv is required for MPLGallery. Install uv, then rerun setup."
}

if (-not (Get-Command npm -ErrorAction SilentlyContinue)) {
    throw "npm is required for the React frontend component. Install Node.js/npm, then rerun setup."
}

if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
    throw "Rust/Cargo is required to build the Windows desktop app. Install Rust, then rerun setup."
}

uv sync --dev
npm --prefix src/mplgallery/ui/frontend install
'''

[[actions]]
name = "Open Desktop App"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File scripts/dev.ps1 desktop-examples"
platform = "win32"

[[actions]]
name = "Open Browser Preview"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File scripts/dev.ps1 preview-url-examples"
platform = "win32"

[[actions]]
name = "Build Windows App"
icon = "build"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File scripts/dev.ps1 windows-dist"
platform = "win32"
