      - "Tauri/Rust tooling is missing and cannot be installed or verified locally."
      - "Need files outside allowed_files."
      - "Verification fails twice."
    receipt:
      result: done
      changed_files:
        - "src/mplgallery/ui/frontend/package.json"
        - "src/mplgallery/ui/frontend/package-lock.json"
        - "src/mplgallery/ui/frontend/vite.config.ts"
        - "src/mplgallery/ui/frontend/tauri.html"
        - "src/mplgallery/ui/frontend/src/tauri-types.ts"
        - "src/mplgallery/ui/frontend/src/tauriMockData.ts"
        - "src/mplgallery/ui/frontend/src/TauriPreviewApp.tsx"
