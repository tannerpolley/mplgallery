# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "GoalBuddy-Managed Tauri React Overhaul"
  slug: "tauri-react-overhaul"
  kind: existing_plan
  tranche: "Create and execute a GoalBuddy-managed migration from Streamlit plot editing to a Tauri + React CSV/PNG/SVG desktop app."
  status: done
  intake:
    original_request: "Before implementation, create a GoalBuddy board to manage the full MPLGallery overhaul from Streamlit/plot-editing app to a Tauri + React desktop app."
    interpreted_outcome: "MPLGallery is migrated through GoalBuddy into a Python-free Tauri + React Windows app for fast CSV, PNG, and SVG browsing."
    input_shape: existing_plan
    audience: "Repo owner and future GoalBuddy PM/Scout/Judge/Worker agents."
    authority: requested
    proof_type: artifact
    completion_proof: "A final Judge or PM audit proves the Tauri app replaces the Streamlit app for the requested browsing scope, with tests, Browser verification, design audit, and Windows packaging evidence."
    likely_misfire: "Stopping after board creation or a Tauri scaffold instead of continuing until the installed app no longer depends on Streamlit/Python and the requested browsing workflows are verified."
    blind_spots_considered:
      - "Python-free runtime boundary must be proven, not assumed."
      - "Side-by-side migration should preserve the working current app until parity is verified."
      - "Loose unrelated PNG/SVG files must be discoverable without polluting analysis-linked plot lists."
      - "Windows installer and updater behavior must survive the runtime migration."
      - "Plot editing, Matplotlib redraw, YAML editing, and generated-plot controls must not creep back into scope."
    existing_plan_facts:
      - "GoalBuddy control files must be created first under docs/goals/tauri-react-overhaul/."
      - "Tauri + React is the target runtime."
      - "Migration is side-by-side first, then replace after parity."
      - "The finished installed Windows app should not require Python at runtime."
      - "Existing Python code may be used as a reference only until Tauri parity is reached."
      - "The new app reads and classifies CSV, PNG, and SVG files."
      - "CSV support starts with preview plus lightweight summary."
      - "Browser verification and design audit are required."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true

agents:
  scout: installed
  worker: installed
  judge: installed

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current Streamlit, pywebview, React component, installer, updater, and core scanning responsibilities."
    inputs:
      - "pyproject.toml"
      - "src/mplgallery/cli.py"
      - "src/mplgallery/desktop.py"
      - "src/mplgallery/updater.py"
      - "src/mplgallery/ui"
      - "src/mplgallery/core"
      - "src/mplgallery/ui/frontend"
      - "tests"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer concrete file-path evidence over generic architecture advice."
      - "Identify which current behaviors are product requirements and which only support Streamlit/plot editing."
    expected_output:
      - "Repo map of current app/runtime boundaries."
      - "List of reusable React/core behaviors."
      - "List of Streamlit/editing/runtime dependencies to retire later."
      - "Verification commands currently available."
      - "Candidate Worker slices or risks for Judge review."
    receipt:
      result: done
      note: notes/T001-repo-map.md
      summary: "Mapped the current Python + Streamlit + pywebview runtime boundary, identified the reusable scan/frontend surfaces, and separated them from editing- and Streamlit-specific systems."
      evidence:
        - "pyproject.toml"
        - "src/mplgallery/cli.py"
        - "src/mplgallery/desktop.py"
        - "src/mplgallery/updater.py"
        - "src/mplgallery/core/studio.py"
        - "src/mplgallery/core/scanner.py"
        - "src/mplgallery/core/models.py"
        - "src/mplgallery/ui/component.py"
        - "src/mplgallery/ui/frontend/src/App.tsx"
        - "src/mplgallery/ui/frontend/src/types.ts"
        - "README.md"
      spawned_tasks:
        - T002
        - T003

  - id: T002
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Define the Tauri scan data model for classified files, CSV preview/summary, image metadata, app settings, and errors."
    inputs:
      - "T001 receipt"
      - "src/mplgallery/core/models.py"
      - "src/mplgallery/core/studio.py"
      - "src/mplgallery/core/scanner.py"
      - "src/mplgallery/ui/frontend/src/types.ts"
      - "src/mplgallery/ui/frontend/src/App.tsx"
    constraints:
      - "Read-only."
      - "Do not implement the model."
      - "Keep the installed-app runtime Python-free."
      - "Preserve loose-image discovery with separate classification from analysis-linked assets."
    expected_output:
      - "Proposed Tauri command surfaces."
      - "Proposed TypeScript/Rust data shapes."
      - "Classification rules for analysis-linked and loose-image assets."
      - "CSV preview/summary minimum fields."
      - "Failure modes and fallback behavior."
    receipt:
      result: done
      note: notes/T002-tauri-data-contract.md
      summary: "Defined a Python-free Tauri command/data contract centered on scan results, file classification, CSV preview/summary, image metadata, root memory, and update status without carrying over redraw or YAML editing."
      evidence:
        - "src/mplgallery/core/models.py"
        - "src/mplgallery/core/studio.py"
        - "src/mplgallery/core/scanner.py"
        - "src/mplgallery/ui/component.py"
        - "src/mplgallery/ui/frontend/src/App.tsx"
        - "src/mplgallery/ui/frontend/src/types.ts"
        - "src/mplgallery/ui/frontend/package.json"
      spawned_tasks:
        - T003

  - id: T003
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Choose the first safe migration slice and confirm the Python-free runtime boundary."
    inputs:
      - "T001 receipt"
      - "T002 receipt"
      - "Goal charter"
      - "Current dirty diff"
    constraints:
      - "Do not implement."
      - "Reject any slice that requires deleting Streamlit before Tauri parity is demonstrated."
      - "Prefer reversible side-by-side work."
    expected_output:
      - "Decision"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "Deferred or blocked tasks"
    receipt:
      result: done
      decision: "Start with a side-by-side Tauri scaffold that reuses the existing React package with static/mock scan data, keeps the Streamlit app intact, and proves the new desktop runtime can build locally before scanner and packaging migration."
      next_allowed_task: T004
      blocked_tasks: []

