          status: pass
        - cmd: "npm --prefix src/mplgallery/ui/frontend test"
          status: pass
        - cmd: "npm --prefix src/mplgallery/ui/frontend run build"
          status: pass
        - cmd: "uv run pytest"
          status: pass
        - cmd: "uv run ruff check ."
          status: pass
