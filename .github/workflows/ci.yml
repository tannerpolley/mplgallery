name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync dependencies
        run: uv sync --dev --group windows-dist

      - name: Frontend tests
        run: npm --prefix src/mplgallery/ui/frontend test

      - name: Frontend build
        run: npm --prefix src/mplgallery/ui/frontend run build

      - name: Rust desktop check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Run Python tests
        run: uv run --no-sync pytest

      - name: Run ruff
        run: uv run --no-sync ruff check .

      - name: Build wheel
        run: uv run --no-sync python -m build
