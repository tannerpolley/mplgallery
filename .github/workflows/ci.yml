name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run Python tests
        run: uv run --no-sync pytest

      - name: Run ruff
        run: uv run --no-sync ruff check .

      - name: Build wheel
        run: uv run --no-sync python -m build

      - name: Fresh install CLI smoke test
        run: |
          python -m venv .wheel-smoke-venv
          .wheel-smoke-venv/bin/pip install --upgrade pip
          .wheel-smoke-venv/bin/pip install dist/*.whl
          mkdir -p "$RUNNER_TEMP/external-analysis/data/processed"
          cat > "$RUNNER_TEMP/external-analysis/data/processed/model_results.csv" <<'CSV'
          time,response,baseline
          0,0.00,0.02
          1,0.18,0.15
          2,0.33,0.28
          3,0.49,0.44
          4,0.61,0.58
          CSV
          cd "$RUNNER_TEMP/external-analysis"
          "$GITHUB_WORKSPACE/.wheel-smoke-venv/bin/mplgallery" run --help
          "$GITHUB_WORKSPACE/.wheel-smoke-venv/bin/mplgallery" draft data --json > draft.json
          "$GITHUB_WORKSPACE/.wheel-smoke-venv/bin/mplgallery" scan . --json > scan.json
          "$GITHUB_WORKSPACE/.wheel-smoke-venv/bin/python" - <<'PY'
          import json
          from pathlib import Path

          draft = json.loads(Path("draft.json").read_text())
          scan = json.loads(Path("scan.json").read_text())
          assert draft["datasets"] == 1
          assert draft["records"], draft
          assert any("model_results.csv" in dataset["relative_path"] for dataset in scan["datasets"])
          assert scan["plots_discovered"] >= 1
          PY
          "$GITHUB_WORKSPACE/.wheel-smoke-venv/bin/mplgallery" run --port 8765 > "$RUNNER_TEMP/mplgallery-run.log" 2>&1 &
          server_pid=$!
          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8765/ > "$RUNNER_TEMP/mplgallery-home.html"; then
              kill "$server_pid"
              wait "$server_pid" || true
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/mplgallery-run.log"
          kill "$server_pid" || true
          exit 1
